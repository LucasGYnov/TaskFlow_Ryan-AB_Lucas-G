apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-backend
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: taskflow-backend
    spec:
      containers:
      - name: backend
        image: lucasgpro/taskflow-backend:staging
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: taskflow-config
        - secretRef:
            name: taskflow-secret
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-cache
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-cache
  template:
    metadata:
      labels:
        app: taskflow-cache
    spec:
      containers:
      - name: cache
        image: redis:7-alpine
        ports:
        - containerPort: 6379
